name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: evalforge
        env:
          APP_ENV: development
          ANTHROPIC_API_KEY: ci-placeholder
          LANGSMITH_API_KEY: ci-placeholder
          LANGSMITH_PROJECT: evalforge-ci
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
          DATABASE_READER_URL: sqlite+aiosqlite:///./ci_test.db
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -q --ignore=tests/db
